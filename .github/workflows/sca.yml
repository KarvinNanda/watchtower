name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # New standard-library CVEs surface over time independently of our own
      # code changes, so this step is informational rather than a hard gate:
      # it must not block the gosec scan/SARIF upload below from running.
      - name: Run govulncheck
        continue-on-error: true
        run: |
          cd backend
          govulncheck ./...

      - name: Install gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      # gosec exits non-zero when it finds issues, by design. Findings are
      # surfaced via the SARIF upload/code scanning tab below, not by
      # failing the build outright, so this step must not block that upload.
      - name: Run gosec
        continue-on-error: true
        run: |
          cd backend
          gosec -fmt=sarif -out=gosec-results.sarif ./...

      - name: Upload gosec results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend/gosec-results.sarif
        if: always()
