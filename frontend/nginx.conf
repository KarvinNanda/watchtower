server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' http://localhost:8080 https://api.telegram.org; frame-ancestors 'none';" always;

    # Hide Nginx version
    server_tokens off;

    # The auth cookie's SameSite (and Secure) attributes are set directly
    # by the Go backend when it issues Set-Cookie (see
    # internal/auth.Service.setAuthCookie), driven by APP_ENV — not here.
    # An `add_header Set-Cookie ...` on this server block would not modify
    # that cookie; nginx's add_header appends a second, independent
    # Set-Cookie header rather than editing the upstream one, and — since
    # this block has no bare cookie name=value pair to attach it to — it
    # would also apply to every static asset response nginx serves
    # directly, not just the API's login/logout responses.

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml;

    # SPA fallback: any path that isn't a real file resolves to index.html
    # so Vue Router's history-mode routes work on a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxied to the api container. Same-origin from the browser's point of
    # view, so no CORS preflight is needed even though the backend also has
    # CORS middleware of its own.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Telegram webhook callbacks (POST /webhook/telegram/{asset,sentinel}),
    # only reachable when the api container runs with TELEGRAM_MODE=webhook.
    location /webhook/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(?:css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
